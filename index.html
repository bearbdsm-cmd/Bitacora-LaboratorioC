<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>
    
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      /* 1. CONFIGURACIÓN DEL ENTORNO DE FONDO */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        /* 🎨 Fondo gris oscuro idéntico al fondo de tus escenas */
        background-color: #191919; 
        overflow: hidden; /* Elimina cualquier barra de scroll molesta */
        
        /* Centrado absoluto perfecto para las franjas de desborde */
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 2. ESCALADO SEGURO DEL CANVAS CON PROPORCIÓN DE MARCA */
      canvas {
        /* Estira el lienzo de forma fluida adaptándose al tamaño del navegador */
        width: 100vw !important;
        height: 100vh !important;
        
        /* 🌟 EL TRUCO MAESTRO: Conserva la proporción original de 800x500 sin deformar.
           Si la pantalla es muy ancha, dejará franjas vacías limpias a los lados,
           y como el fondo de body es del mismo color, se camuflarán por completo. */
        object-fit: contain; 
        display: block;
        
        /* Mantiene la nitidez estética de los píxeles al ampliarse */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <main>
    </main>
    <script src="escena0.js"></script>
    <script src="escena1.js"></script>
    <script src="escena2.js"></script>
    <script src="escena3.js"></script>
    <script src="escena4.js"></script>
    <script src="escena5.js"></script>    
    <script src="sketch.js"></script>
  </body>
</html>
