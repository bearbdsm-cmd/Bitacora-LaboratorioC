    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        /* 🎨 Fondo gris oscuro idéntico al background(25) de tus escenas */
        background-color: #191919; 
        overflow: auto; /* Permite scroll normal si la pantalla del computador es muy chica */
        
        /* 🎯 Centrado absoluto tradicional y seguro (Horizontal y Vertical) */
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* El canvas se queda en su tamaño original protegido de 800x500 */
      canvas {
        display: block;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.5); /* Sombra elegante para recortar el lienzo */
      }
    </style>
  </head>
