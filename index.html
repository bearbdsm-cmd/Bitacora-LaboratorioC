<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>
    
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      /* 1. CONFIGURACIÓN DEL ENTORNO DE FONDO */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #191919; 
        overflow: hidden; 
        
        /* 🎯 CAMBIO CLAVE: Centrado estrictamente HORIZONTAL, pegado al techo vertical */
        display: flex;
        justify-content: center;
        align-items: flex-start; 
      }

      /* Contenedor relativo que mantiene la proporción 16:10 nativa */
      main {
        position: relative;
        width: 100vw;
        height: 62.5vw; /* 500 / 800 = 0.625 */
        max-width: 160vh; 
        max-height: 100vh; /* Aquí se congela el canvas en pantallas grandes */
      }

      /* 2. ESCALADO SEGURO DEL CANVAS */
      canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* 🌟 EL PRENSADO MULTIMEDIA REAL:
         Como el video ahora nacerá DENTRO del <main>, los porcentajes miden
         exactamente respecto al televisor. Si el canvas se congela, el video se congela ipso facto. */
      video {
        width: 25% !important; 
        height: auto !important;
        position: absolute !important;
        
        /* Coordenadas relativas perfectas sobre el monitor fucsia */
        left: 65.1% !important; 
        top: 33.1% !important;
        
        z-index: 10; 
        box-shadow: 0 0 15px rgba(0,0,0,0.5); 
      }
    </style>
  </head>
  <body>
    <main id="contenedor-obra">
    </main>
    <script src="escena0.js"></script>
    <script src="escena1.js"></script>
    <script src="escena2.js"></script>
    <script src="escena3.js"></script>
    <script src="escena4.js"></script>
    <script src="escena5.js"></script>    
    <script src="sketch.js"></script>
  </body>
</html>
