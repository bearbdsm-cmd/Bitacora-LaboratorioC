<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>
    
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
      /* 1. CONFIGURACIÓN DEL ENTORNO DE FONDO */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #191919; 
        overflow: hidden; 
        
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 🌟 EL ANCLA GLOBAL: Este contenedor mantiene la proporción 16:10 
         y se congela cuando llega al borde de la pantalla */
      main {
        position: relative;
        width: 100vw;
        height: 62.5vw; /* Mantiene la proporción 800x500 (500/800 = 0.625) */
        max-width: 160vh; /* Se congela en pantallas muy anchas */
        max-height: 100vh;
      }

      /* 2. ESCALADO SEGURO DEL CANVAS */
      canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* 🌟 EL PARCHE MULTIMEDIA ABSOLUTO */
      video {
        /* 🎯 TAMAÑO EN % RESPECTO AL LIENZO: 
           Como la pantalla del TV mide 200px de un canvas de 800px, 
           su ancho real debe ser exactamente el 25% del contenedor. 
           Si el contenedor se congela, el video se congela con él. */
        width: 25% !important; 
        height: auto !important;
        
        position: absolute !important;
        
        /* 🎯 COORDENADAS MATEMÁTICAS RESPECTO AL CONTENEDOR:
           Calculadas con precisión desde la esquina superior izquierda del <main> */
        left: 65.1% !important; 
        top: 33.1% !important;
        
        z-index: 10; 
        box-shadow: 0 0 15px rgba(0,0,0,0.6); 
      }
    </style>
  </head>
  <body>
    <main>
      </main>
    <script src="escena0.js"></script>
    <script src="escena1.js"></script>
    <script src="escena2.js"></script>
    <script src="escena3.js"></script>
    <script src="escena4.js"></script>
    <script src="escena5.js"></script>    
    <script src="sketch.js"></script>
  </body>
</html>
