<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>
    
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      /* 1. CONFIGURACIÓN DEL ENTORNO DE FONDO */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #191919; 
        overflow: hidden; 
        
        /* Contenedor Flex para que tanto el canvas como sus videos se posicionen juntos al centro */
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Contenedor relativo que agrupa el canvas y los elementos flotantes */
      main {
        position: relative;
        /* Forzamos a que el contenedor mantenga la proporción 16:10 nativa de tu obra */
        width: 100vw;
        height: 62.5vw; /* 500 / 800 = 0.625 (Proporción exacta) */
        max-width: 160vh; /* 800 * (100 / 500) = 160 */
        max-height: 100vh;
      }

      /* 2. ESCALADO SEGURO DEL CANVAS */
      canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* 🌟 EL TRUCO MAESTRO MULTIMEDIA PARA LOS VIDEOS FLOTANTES */
/* 🌟 EL PARCHE MULTIMEDIA DEFINITIVO */
      video {
        /* Bloqueamos el tamaño del video proporcional al ancho de la pantalla */
        width: 25vw !important; 
        max-width: 400px !important; /* Tope para que no crezca infinito en monitores 4K */
        height: auto !important;
        
        position: absolute !important;
        
        /* 🎯 COORDENADAS RECALIBRADAS EN Vw:
           Alinean el video milimétricamente con el centro del monitor fucsia */
        left: 65.2% !important; 
        top: 35.8% !important;
        
        z-index: 10; 
        box-shadow: 0 0 15px rgba(0,0,0,0.6); 
      }
    </style>
  </head>
  <body>
    <main>
      </main>
    <script src="escena0.js"></script>
    <script src="escena1.js"></script>
    <script src="escena2.js"></script>
    <script src="escena3.js"></script>
    <script src="escena4.js"></script>
    <script src="escena5.js"></script>    
    <script src="sketch.js"></script>
  </body>
</html>
